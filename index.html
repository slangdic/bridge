<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>A사전</title>
    <meta name="description" content="신조어사전, 신조어, 신조어 사전 정보를 제공하는 A사전입니다.">
    <meta name="keywords" content="신조어사전, 신조어, 신조어 사전">
    <meta name="robots" content="index, follow">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root {
            --primary-blue: #007AFF;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.15);
            --glass-shadow: 0 20px 50px 0 rgba(0, 0, 0, 0.1);
            --black: #000000;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Pretendard", sans-serif;
            background-color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--black);
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 24px;
            text-align: center;
        }

        /* 상단 헤더: 로고와 명칭 수평 정렬 */
        .header-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 70px;
        }

        .header-section svg {
            width: 55px;
            height: 55px;
            display: block;
        }

        .header-section h1 {
            margin: 0;
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--black);
            line-height: 55px;
        }

        /* 검색 구역 확대 */
        .search-area {
            width: 100%;
            margin-bottom: 60px;
            position: relative;
        }

        .search-bar {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        input {
            flex: 1;
            padding: 24px 35px;
            border: 2px solid #EEEEEE;
            border-radius: 28px;
            font-size: 1.3rem;
            background: #FAFAFA;
            outline: none;
            color: var(--black);
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--black);
            background: #FFFFFF;
        }

        button {
            padding: 0 45px;
            background: var(--black);
            color: white;
            border: none;
            border-radius: 28px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.96); }

        /* 결과 목록 팝업 */
        .result-popup {
            position: absolute;
            top: 110%;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: var(--glass-shadow);
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        .result-item {
            padding: 22px 30px;
            text-align: left;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 1.2rem;
            color: var(--black);
        }

        .result-item:hover { background: rgba(0,0,0,0.03); }

        /* 하단 랜덤 구역 */
        .random-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .random-card {
            width: 100%;
            padding: 50px;
            background: #FFFFFF;
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s;
        }

        .random-card .word {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--black);
            margin-bottom: 18px;
        }

        .random-card .mean {
            font-size: 1.3rem;
            color: #444444;
            line-height: 1.7;
            margin: 0;
        }

        /* 상세 결과 팝업 */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.08);
            backdrop-filter: blur(25px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .overlay.show { display: flex; }

        .detail-card {
            width: 90%;
            max-width: 500px;
            padding: 70px 40px;
            background: #FFFFFF;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            position: relative;
            text-align: center;
        }

        #detailWord { font-size: 2.8rem; font-weight: 800; color: var(--black); margin-bottom: 25px; }
        #detailMean { font-size: 1.4rem; color: #333333; line-height: 1.7; }
        .close-btn { position: absolute; top: 30px; right: 35px; font-size: 3rem; border: none; background: none; color: #DDDDDD; cursor: pointer; }

        @media (max-width: 600px) {
            .header-section h1 { font-size: 2.5rem; }
            .header-section svg { width: 45px; height: 45px; }
            .app-container { padding: 40px 15px; }
            .random-card { padding: 35px 25px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header-section">
            <svg viewBox="0 0 100 100">
                <polygon points="50,10 90,80 10,80" fill="black"/>
            </svg>
            <h1>A사전</h1>
        </header>

        <div class="search-area">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="찾으시는 단어를 입력해 보세요" oninput="handleLiveSearch()" onkeypress="if(event.key==='Enter')handleSearchClick()">
                <button onclick="handleSearchClick()">검색</button>
            </div>
            <div id="resultPopup" class="result-popup"></div>
        </div>

        <section class="random-section">
            <div class="random-card" id="card1">
                <div class="word">...</div>
                <p class="mean">데이터 로딩 중</p>
            </div>
            <div class="random-card" id="card2">
                <div class="word">...</div>
                <p class="mean">데이터 로딩 중</p>
            </div>
        </section>
    </div>

    <div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
        <div class="detail-card">
            <button class="close-btn" onclick="closeDetail()">&times;</button>
            <div id="detailWord"></div>
            <div id="detailMean"></div>
        </div>
    </div>

    <script>
        // 사용자 Firebase 설정 유지
        const firebaseConfig = {
            apiKey: "AIzaSyBqzKxNTMPOURq8M5zmYlBogm1TsJmkFYw",
            authDomain: "bridge-addd2.firebaseapp.com",
            projectId: "bridge-addd2",
            storageBucket: "bridge-addd2.firebasestorage.app",
            messagingSenderId: "219734716082",
            appId: "1:219734716082:web:0886fdeed49f3bbf3ae3ab" 
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allSlangs = [];

        async function init() {
            try {
                const snapshot = await db.collection('slangs').get();
                allSlangs = snapshot.docs.map(doc => doc.data());
                setRandomCards();
            } catch (e) { console.error("데이터 로드 오류:", e); }
        }

        function handleLiveSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const popup = document.getElementById('resultPopup');

            if (!query) {
                popup.style.display = 'none';
                return;
            }

            const filtered = allSlangs.filter(item => item.word.includes(query));

            if (filtered.length > 0) {
                popup.innerHTML = filtered.map(item => `
                    <div class="result-item" onclick="openDetail('${item.word}', '${item.mean}')">
                        ${item.word}
                    </div>
                `).join('');
                popup.style.display = 'block';
            } else {
                popup.style.display = 'none';
            }
        }

        function handleSearchClick() {
            const query = document.getElementById('searchInput').value.trim();
            const match = allSlangs.find(item => item.word === query);
            if(match) openDetail(match.word, match.mean);
            else if(query) openDetail(query, "A사전에 아직 등록되지 않은 단어입니다.");
        }

        function setRandomCards() {
            const shuffled = [...allSlangs].sort(() => 0.5 - Math.random());
            if (shuffled[0]) {
                document.querySelector('#card1 .word').innerText = shuffled[0].word;
                document.querySelector('#card1 .mean').innerText = shuffled[0].mean;
            }
            if (shuffled[1]) {
                document.querySelector('#card2 .word').innerText = shuffled[1].word;
                document.querySelector('#card2 .mean').innerText = shuffled[1].mean;
            }
        }

        function openDetail(word, mean) {
            document.getElementById('detailWord').innerText = word;
            document.getElementById('detailMean').innerText = mean;
            document.getElementById('overlay').classList.add('show');
            document.getElementById('resultPopup').style.display = 'none';
        }

        function closeDetail() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('searchInput').value = '';
        }

        init();
    </script>
</body>
</html>
