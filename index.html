<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모두이음-신조어 사전</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root {
            --primary-main: #055C9D;
            --primary-accent: #0E86D4;
            --bg-light: #F0F8FF;
        }

        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            padding: 40px 20px;
            text-align: center;
        }

        .search-container {
            width: 90%;
            max-width: 500px;
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid var(--primary-main);
            border-radius: 12px;
            font-size: 1rem;
        }

        button {
            padding: 15px 25px;
            background: var(--primary-main);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .card {
            width: 90%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
        }

        #wordDisplay {
            font-size: 2rem;
            color: var(--primary-main);
            margin-bottom: 20px;
            font-weight: 800;
        }

        #meanDisplay {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
            word-break: keep-all;
        }

        /* 주석 처리된 구역 스타일 (필요 시 유지) */
        /* .example-box { ... } */
    </style>
</head>
<body>

    <div class="header">
        <h1>모두이음-신조어 사전</h1>
        <p>요즘 유행하는 단어, 바로 검색해보세요!</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="단어를 입력하세요..." onkeypress="if(event.keyCode==13) searchSlang(this.value)">
        <button onclick="searchSlang(document.getElementById('searchInput').value)">검색</button>
    </div>

    <div class="card" id="mainCard">
        <div id="wordDisplay">준비 완료!</div>
        <div id="meanDisplay">검색창에 궁금한 단어를 입력해 보세요.</div>
        
        </div>

    <script>
        // Firebase 설정 (사용자님의 키 정보로 유지하세요)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // 검색 함수
        async function searchSlang(word) {
            if (!word.trim()) return;

            // [수정] 로딩 표시 로직 제거 (화면 흔들림 원인 차단)
            try {
                // 컬렉션 이름을 'slangs'로 지정
                const snapshot = await db.collection('slangs')
                                       .where('word', '==', word.trim())
                                       .get();

                if (!snapshot.empty) {
                    const data = snapshot.docs[0].data();
                    // [수정] 뜻만 표시하고 예시는 빈 값 전달
                    displayResult(data.word, data.mean);
                } else {
                    alert(`'${word}'은(는) 아직 등록되지 않은 단어입니다.`);
                }
            } catch (error) {
                console.error("데이터 조회 오류:", error);
                alert("데이터를 가져오는 중에 문제가 발생했습니다.");
            }
        }

        // 결과 화면 표시 함수
        function displayResult(word, mean) {
            const wordDisplay = document.getElementById('wordDisplay');
            const meanDisplay = document.getElementById('meanDisplay');
            
            // 부드러운 전환을 위한 처리
            wordDisplay.style.opacity = 0;
            meanDisplay.style.opacity = 0;

            setTimeout(() => {
                wordDisplay.innerText = word;
                meanDisplay.innerText = mean;
                wordDisplay.style.opacity = 1;
                meanDisplay.style.opacity = 1;
                
                // [수정] 예시 문장 요소가 주석 처리되었으므로 업데이트하지 않음
            }, 200);
        }
    </script>
</body>
</html>
