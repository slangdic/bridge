<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모두이음-신조어 사전</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root {
            --primary-main: rgba(0, 122, 255, 0.9);
            --bg-light: #FFFFFF;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.08);
            --text-color: #000000;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-light);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header-section {
            margin-top: 25vh;
            text-align: center;
            background: none;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
        }

        .header-section h1 {
            margin: 0;
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--text-color);
            background: linear-gradient(180deg, #000 60%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            position: fixed;
            bottom: 40px;
            width: 85%;
            max-width: 500px;
            display: flex;
            gap: 10px;
            padding: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            z-index: 100;
        }

        input {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 18px;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.5);
            outline: none;
        }

        button {
            padding: 16px 24px;
            background: var(--primary-main);
            color: white;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 600;
            -webkit-tap-highlight-color: transparent;
        }

        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .popup-overlay.show { display: flex; }

        .popup-card {
            width: 80%;
            max-width: 400px;
            padding: 40px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            text-align: center;
            position: relative;
        }

        #wordDisplay {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--primary-main);
        }

        #meanDisplay {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #333;
        }

        .close-popup {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .header-section h1 { font-size: 3rem; }
            .search-container { bottom: 30px; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>모두이음</h1>
    </div>
