<!DOCTYPE html>
<html lang="ko">
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>A사전</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,10 90,80 10,80' fill='black'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='white'/><polygon points='50,15 85,85 15,85' fill='black'/></svg>">
    
    <meta name="description" content="신조어사전, 신조어, 신조어 사전 정보를 제공하는 A사전입니다.">
    <meta name="keywords" content="신조어사전, 신조어, 신조어 사전">
    <meta name="robots" content="index, follow">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        /* ... 이후 기존 CSS 코드 동일 ... */
</head>
        :root {
            --primary-blue: #000000;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.15);
            --glass-shadow: 0 20px 50px 0 rgba(0, 0, 0, 0.05);
            --black: #000000;
        }

        * { box-sizing: border-box; }

        /* 상하좌우 스크롤 금지 설정 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 스크롤 차단 */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Pretendard", sans-serif;
            background-color: #FFFFFF;
            color: var(--black);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 95%;
            max-width: 1600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .header-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .header-section svg {
            width: 50px;
            height: 50px;
            display: block;
        }

        .header-section h1 {
            margin: 0;
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--black);
            line-height: 50px;
        }

        .search-area {
            width: 100%;
            margin-bottom: 30px;
            position: relative;
        }

        .search-bar {
            display: flex;
            width: 100%;
        }

        input {
            flex: 1;
            padding: 20px 30px;
            border: 2px solid #EEEEEE;
            border-radius: 20px;
            font-size: 1.4rem;
            background: #FAFAFA;
            outline: none;
            color: var(--black);
            transition: all 0.3s ease;
            text-align: center; /* 버튼이 없으므로 중앙 정렬이 깔끔함 */
        }

        input:focus {
            border-color: var(--black);
            background: #FFFFFF;
        }

        /* 데스크톱에서만 돋보기 버튼 표시, 모바일은 삭제 */
        button#searchButton {
            padding: 0 35px;
            background: var(--black);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
        }

        @media (max-width: 1024px) {
            button#searchButton {
                display: none; /* 모바일 환경 검색 버튼 삭제 */
            }
            .random-section {
                flex-direction: column;
                gap: 15px;
            }
            .header-section h1 { font-size: 2.5rem; }
            .random-card { padding: 30px 20px !important; }
        }

        .random-section {
            width: 100%;
            display: flex;
            flex-direction: row;
            gap: 25px;
            justify-content: center;
        }

        .random-card {
            flex: 1;
            padding: 50px 30px;
            background: #FFFFFF;
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--glass-shadow);
        }

        .random-card .word {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--black);
            margin-bottom: 15px;
        }

        .random-card .mean {
            font-size: 1.2rem;
            color: var(--black);
            line-height: 1.5;
            margin: 0;
        }

        /* 팝업 설정 */
        .result-popup {
            position: absolute;
            top: 110%;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        .result-item {
            padding: 18px 25px;
            text-align: left;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 1.2rem;
            color: var(--black);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(25px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .overlay.show { display: flex; }

        .detail-card {
            width: 85%;
            max-width: 600px;
            padding: 60px 40px;
            background: #FFFFFF;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            position: relative;
            text-align: center;
        }

        #detailWord { font-size: 3rem; font-weight: 800; color: var(--black); margin-bottom: 25px; }
        #detailMean { font-size: 1.5rem; color: var(--black); line-height: 1.6; }
        .close-btn { position: absolute; top: 25px; right: 30px; font-size: 3rem; border: none; background: none; color: #000; cursor: pointer; }

    </style>
</head>
<body>

    <div class="app-container">
        <header class="header-section">
            <svg viewBox="0 0 100 100">
                <polygon points="50,10 90,80 10,80" fill="black"/>
            </svg>
            <h1>A사전</h1>
        </header>

        <div class="search-area">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="단어를 입력하고 완료를 누르세요" oninput="handleLiveSearch()" onkeypress="if(event.key==='Enter')handleSearchClick()">
                <button id="searchButton" onclick="handleSearchClick()">
                    <span class="search-icon">🔍</span>
                </button>
            </div>
            <div id="resultPopup" class="result-popup"></div>
        </div>

        <section class="random-section">
            <div class="random-card" id="card1">
                <div class="word">...</div>
                <p class="mean">데이터 로딩 중</p>
            </div>
            <div class="random-card" id="card2">
                <div class="word">...</div>
                <p class="mean">데이터 로딩 중</p>
            </div>
        </section>
    </div>

    <div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
        <div class="detail-card">
            <button class="close-btn" onclick="closeDetail()">&times;</button>
            <div id="detailWord"></div>
            <div id="detailMean"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBqzKxNTMPOURq8M5zmYlBogm1TsJmkFYw",
            authDomain: "bridge-addd2.firebaseapp.com",
            projectId: "bridge-addd2",
            storageBucket: "bridge-addd2.firebasestorage.app",
            messagingSenderId: "219734716082",
            appId: "1:219734716082:web:0886fdeed49f3bbf3ae3ab" 
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allSlangs = [];

        async function init() {
            try {
                const snapshot = await db.collection('slangs').get();
                allSlangs = snapshot.docs.map(doc => doc.data());
                setRandomCards();
            } catch (e) { console.error("데이터 로드 오류:", e); }
        }

        function handleLiveSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const popup = document.getElementById('resultPopup');

            if (!query) {
                popup.style.display = 'none';
                return;
            }

            const filtered = allSlangs.filter(item => item.word.includes(query));

            if (filtered.length > 0) {
                popup.innerHTML = filtered.map(item => `
                    <div class="result-item" onclick="openDetail('${item.word}', '${item.mean}')">
                        ${item.word}
                    </div>
                `).join('');
                popup.style.display = 'block';
            } else {
                popup.style.display = 'none';
            }
        }

        function handleSearchClick() {
            const query = document.getElementById('searchInput').value.trim();
            const match = allSlangs.find(item => item.word === query);
            if(match) openDetail(match.word, match.mean);
            else if(query) openDetail(query, "A사전에 아직 등록되지 않은 단어입니다.");
            // 키보드 숨기기 처리 (모바일 편의성)
            document.getElementById('searchInput').blur();
        }

        function setRandomCards() {
            const shuffled = [...allSlangs].sort(() => 0.5 - Math.random());
            if (shuffled[0]) {
                document.querySelector('#card1 .word').innerText = shuffled[0].word;
                document.querySelector('#card1 .mean').innerText = shuffled[0].mean;
            }
            if (shuffled[1]) {
                document.querySelector('#card2 .word').innerText = shuffled[1].word;
                document.querySelector('#card2 .mean').innerText = shuffled[1].mean;
            }
        }

        function openDetail(word, mean) {
            document.getElementById('detailWord').innerText = word;
            document.getElementById('detailMean').innerText = mean;
            document.getElementById('overlay').classList.add('show');
            document.getElementById('resultPopup').style.display = 'none';
        }

        function closeDetail() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('searchInput').value = '';
        }

        init();
    </script>
</body>
</html>
