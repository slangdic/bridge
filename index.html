<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>A사전</title>
    <meta name="description" content="신조어사전, 신조어, 신조어 사전 정보를 제공하는 A사전입니다.">
    <meta name="keywords" content="신조어사전, 신조어, 신조어 사전">
    <meta name="robots" content="index, follow">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root {
            --primary-blue: #000000; /* 파란색 대신 검은색 사용 */
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.15);
            --glass-shadow: 0 20px 50px 0 rgba(0, 0, 0, 0.05);
            --black: #000000;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Pretendard", sans-serif;
            background-color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 화면 높이에 맞춤 */
            overflow: hidden; /* 전체 스크롤 방지 */
            color: var(--black);
        }

        .app-container {
            width: 95%; /* 가로로 최대한 늘림 */
            max-width: 1600px; /* 데스크탑 대응 최대 너비 확장 */
            height: 90vh; /* 내부 구역이 꽉 차도록 설정 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .header-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .header-section svg {
            width: 60px;
            height: 60px;
            display: block;
        }

        .header-section h1 {
            margin: 0;
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--black); /* 검은색 */
            line-height: 60px;
        }

        .search-area {
            width: 100%;
            margin-bottom: 40px;
            position: relative;
        }

        .search-bar {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        input {
            flex: 1;
            padding: 25px 35px;
            border: 2px solid #EEEEEE;
            border-radius: 20px;
            font-size: 1.5rem;
            background: #FAFAFA;
            outline: none;
            color: var(--black); /* 검은색 */
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--black);
            background: #FFFFFF;
        }

        button#searchButton {
            padding: 0 40px;
            background: var(--black);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-icon {
            font-size: 2rem;
        }

        .random-section {
            width: 100%;
            display: flex;
            flex-direction: row; /* 가로로 배열하여 공간 활용 */
            gap: 30px;
            justify-content: center;
        }

        .random-card {
            flex: 1;
            padding: 60px 40px;
            background: #FFFFFF;
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--glass-shadow);
        }

        .random-card .word {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--black); /* 검은색 */
            margin-bottom: 20px;
        }

        .random-card .mean {
            font-size: 1.4rem;
            color: var(--black); /* 검은색으로 수정 */
            line-height: 1.6;
            margin: 0;
        }

        /* 팝업 및 상세 화면 */
        .result-popup {
            position: absolute;
            top: 110%;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        .result-item {
            padding: 20px 30px;
            text-align: left;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 1.3rem;
            color: var(--black);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(25px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .overlay.show { display: flex; }

        .detail-card {
            width: 90%;
            max-width: 700px;
            padding: 80px 50px;
            background: #FFFFFF;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            position: relative;
            text-align: center;
        }

        #detailWord { font-size: 3.5rem; font-weight: 800; color: var(--black); margin-bottom: 30px; }
        #detailMean { font-size: 1.8rem; color: var(--black); line-height: 1.7; }
        .close-btn { position: absolute; top: 30px; right: 35px; font-size: 3.5rem; border: none; background: none; color: #000; cursor: pointer; }

        /* 모바일 대응 */
        @media (max-width: 1024px) {
            .random-section { flex-direction: column; }
            .app-container { height: auto; overflow-y: auto; }
            body { overflow: auto; }
            .header-section h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header-section">
            <svg viewBox="0 0 100 100">
                <polygon points="50,10 90,80 10,80" fill="black"/>
            </svg>
            <h1>A사전</h1>
        </header>

        <div class="search-area">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="찾으시는 단어를 입력해 보세요" oninput="handleLiveSearch()" onkeypress="if(event.key==='Enter')handleSearchClick()">
                <button id="searchButton" onclick="handleSearchClick()">
                    <span class="search-icon">🔍</span>
                </button>
            </div>
            <div id="resultPopup" class="result-popup"></div>
        </div>

        <section class="random-section">
            <div class="random-card" id="card1">
                <div class="word">...</div>
                <p class="mean">데이터 로딩 중</p>
            </div>
            <div class="random-card" id="card2">
                <div class="word">...</div>
                <p class="mean">데이터 로딩 중</p>
            </div>
        </section>
    </div>

    <div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
        <div class="detail-card">
            <button class="close-btn" onclick="closeDetail()">&times;</button>
            <div id="detailWord"></div>
            <div id="detailMean"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBqzKxNTMPOURq8M5zmYlBogm1TsJmkFYw",
            authDomain: "bridge-addd2.firebaseapp.com",
            projectId: "bridge-addd2",
            storageBucket: "bridge-addd2.firebasestorage.app",
            messagingSenderId: "219734716082",
            appId: "1:219734716082:web:0886fdeed49f3bbf3ae3ab" 
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allSlangs = [];

        async function init() {
            try {
                const snapshot = await db.collection('slangs').get();
                allSlangs = snapshot.docs.map(doc => doc.data());
                setRandomCards();
            } catch (e) { console.error("데이터 로드 오류:", e); }
        }

        function handleLiveSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const popup = document.getElementById('resultPopup');

            if (!query) {
                popup.style.display = 'none';
                return;
            }

            const filtered = allSlangs.filter(item => item.word.includes(query));

            if (filtered.length > 0) {
                popup.innerHTML = filtered.map(item => `
                    <div class="result-item" onclick="openDetail('${item.word}', '${item.mean}')">
                        ${item.word}
                    </div>
                `).join('');
                popup.style.display = 'block';
            } else {
                popup.style.display = 'none';
            }
        }

        function handleSearchClick() {
            const query = document.getElementById('searchInput').value.trim();
            const match = allSlangs.find(item => item.word === query);
            if(match) openDetail(match.word, match.mean);
            else if(query) openDetail(query, "A사전에 아직 등록되지 않은 단어입니다.");
        }

        function setRandomCards() {
            const shuffled = [...allSlangs].sort(() => 0.5 - Math.random());
            if (shuffled[0]) {
                document.querySelector('#card1 .word').innerText = shuffled[0].word;
                document.querySelector('#card1 .mean').innerText = shuffled[0].mean;
            }
            if (shuffled[1]) {
                document.querySelector('#card2 .word').innerText = shuffled[1].word;
                document.querySelector('#card2 .mean').innerText = shuffled[1].mean;
            }
        }

        function openDetail(word, mean) {
            document.getElementById('detailWord').innerText = word;
            document.getElementById('detailMean').innerText = mean;
            document.getElementById('overlay').classList.add('show');
            document.getElementById('resultPopup').style.display = 'none';
        }

        function closeDetail() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('searchInput').value = '';
        }

        init();
    </script>
</body>
</html>
